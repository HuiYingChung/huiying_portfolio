  <link rel="stylesheet" href="css/shared.css">
  <script>
    (function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();
  </script>

  <!-- SEO -->
  <meta name="description" content="Contact Huiying Chung — UX/UI and front-end designer available for internships and full-time roles. Based in Arizona, graduating from ASU Summer 2026.">

  <meta property="og:description" content="UX/UI and front-end designer available for internships and full-time roles. Based in Arizona, graduating from ASU Summer 2026.">

  <meta property="og:url" content="https://huiyingchung.github.io/contact.html">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Contact — Huiying Chung">
  <meta name="twitter:description" content="UX/UI and front-end designer available for internships and full-time roles. Based in Arizona, graduating from ASU Summer 2026.">
  <style>
    /* ── Tokens ── */
    :root {
      --bg:          #F4F3F7;
      --bg-card:     #ECEAF2;
      --text:        #18161F;
      --text-muted:  #6A6478;
      --accent:      #6B3FA0;
      --accent-soft: #E4DCEF;
      --border:      #DDD9E8;
      --nav-bg:      rgba(244,243,247,0.88);
      --font-display: 'Syne', sans-serif;
      --font-body:    'Figtree', sans-serif;
    }
    [data-theme="dark"] {
      --bg:          #100E16;
      --bg-card:     #1A1723;
      --text:        #EDE9F5;
      --text-muted:  #A89DBF;
      --accent:      #9B6FD0;
      --accent-soft: #2E2245;
      --border:      #302848;
      --nav-bg:      rgba(16,14,22,0.92);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      transition: background 0.3s, color 0.3s;
    }

    /* ── Page layout ── */
    .page-wrap {
      min-height: 100svh;
      display: flex;
      align-items: center;
      padding: 64px 1.5rem 4rem;
    }
    .contact-card {
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
    }
    .page-label {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }
    .page-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 0.75rem;
    }
    .page-sub {
      font-size: 1rem;
      color: var(--text-muted);
      line-height: 1.65;
      margin-bottom: 2.5rem;
    }

    /* ── Form ── */
    .contact-form { display: flex; flex-direction: column; gap: 1.25rem; }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }

    .field-group { display: flex; flex-direction: column; gap: 0.4rem; }

    label {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--text-muted);
    }

    input, textarea {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.75rem 1rem;
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--text);
      width: 100%;
      transition: border-color 0.2s, background 0.3s, color 0.3s;
      outline: none;
    }
    input::placeholder, textarea::placeholder { color: var(--text-muted); opacity: 0.6; }
    input:focus, textarea:focus { border-color: var(--accent); }

    textarea { resize: vertical; min-height: 160px; line-height: 1.6; }

    .submit-btn {
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--text);
      color: var(--bg);
      font-family: var(--font-display);
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 0.9rem 2.2rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      margin-top: 0.25rem;
    }
    .submit-btn:hover {
      background: var(--accent);
      transform: translateY(-2px);
    }
    .submit-btn svg { width: 14px; height: 14px; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .field-row { grid-template-columns: 1fr; }
      .page-wrap { padding-top: 80px; }
    }
  </style>
</head>
<body>

  <nav aria-label="Site navigation">
    <a class="nav-back" href="index.html">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10 3L5 8l5 5"/>
      </svg>
      Portfolio
    </a>
    <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">
      <svg class="icon-moon" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M6 .278a.768.768 0 0 1 .08.858 7.208 7.208 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.349 8.349 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.752.752 0 0 1 6 .278z"/></svg>
      <svg class="icon-sun" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0zm0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13zm8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5zM3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8zm10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0zm-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0zm9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707zM4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708z"/></svg>
    </button>
  </nav>

  <main class="page-wrap">
    <div class="contact-card">
      <p class="page-label">Get in touch</p>
      <h1 class="page-title">Let's work<br>together.</h1>
      <p class="page-sub">
        Open to full-time roles and internships in UX/UI design,
        front-end development, and digital content. I'd love to hear from you.
      </p>

      <!--
        FORMSPREE SETUP:
        1. Go to https://formspree.io and sign up with hchung46@asu.edu
        2. Click "New Form" → give it a name like "Portfolio Contact"
        3. Copy the form endpoint URL (looks like https://formspree.io/f/xyzabc)
        4. Replace YOUR_FORM_ID below with just the ID part (e.g. xyzabc)
      -->
      <form
        class="contact-form"
        action="https://formspree.io/f/mykdrwpr"
        method="POST"
      >
        <!-- Hidden fields -->
        <input type="hidden" name="_subject" value="New message from your portfolio">
        <input type="hidden" name="_next" value="https://huiying-portfolio.vercel.app/contact-thanks.html">
        <!-- Honeypot spam filter -->
        <input type="text" name="_gotcha" style="display:none" aria-hidden="true" tabindex="-1" autocomplete="off">

        <div class="field-row">
          <div class="field-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required placeholder="Your name" autocomplete="name">
          </div>
          <div class="field-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="_replyto" required placeholder="your@email.com" autocomplete="email">
          </div>
        </div>

        <div class="field-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject" placeholder="What's this about?">
        </div>

        <div class="field-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" required placeholder="Tell me about your project, role, or just say hello."></textarea>
        </div>

        <button type="submit" class="submit-btn">
          Send Message
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M3 8h10M9 4l4 4-4 4"/>
          </svg>
        </button>
      </form>
    </div>
  </main>

  <footer>
    <span>© 2026 Huiying Chung</span>
    <a href="index.html#work">← Back to Portfolio</a>
  </footer>

  <script src="js/theme-toggle.js"></script>
</body>
</html>
